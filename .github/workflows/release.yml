name: Release

# v* 태그를 push하면 .app을 빌드해 zip으로 묶어 GitHub Release에 올린다.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Generate app icon
        run: bash Scripts/make-icon.sh

      - name: Build .app bundle
        run: bash Scripts/bundle-app.sh release

      - name: Package zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --keepParent "build/Jansori Tomato.app" "build/JansoriTomato-${VERSION}.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/JansoriTomato-*.zip
          generate_release_notes: true
